<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/favicon-javascript.png" type="image/x-icon">
    <title>Document</title>
</head>
<body>
    
    <script>
        let nome = window.prompt("Qual o seu nome: ")
        document.write(`Olá! ${nome} seu nome tem ${nome.length} letras.`)
        document.write(`Seu nome em letra maiusculas é ${nome.toUpperCase()}`)
        document.write(`Seu nome em letras minusculas é ${nome.toLowerCase()}`)
    </script>
</body>
</html>
